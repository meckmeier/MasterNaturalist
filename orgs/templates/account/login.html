{% extends "orgs/layout.html" %}

{% block body %}
<div class="me-page">
    <h2>Login</h2>

    {% if message %}
        <div>{{ message }}</div>
    {% endif %}

  <form method="post" action="{% url 'account_login' %}" novalidate>
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div class="form-group mb-3">
        <input autofocus class="form-control" type="text" name="login" placeholder="Email or username">
        {{ form.login.errors }}
    </div>

    <div class="form-group mb-3">
        <input class="form-control" type="password" name="password" placeholder="Password">
        {{ form.password.errors }}
    </div>

    <div class="text-end mb-3">
        <a href="{% url 'account_reset_password' %}">Forgot password?</a>
    </div>

    <input class="me-btn-simple" type="submit" value="Login">
</form>

    Don't have an account? <a href="{% url 'account_signup' %}" class="me-button-link">Register here.</a>
</div>
{% endblock %}
