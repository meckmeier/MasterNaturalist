
{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Volunteer Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #map { height: 90vh; width: 100%; }
  </style>
</head>
<body>
  <h1>Volunteer Map</h1>

  <div id="map" style="width: 100%; height: 600px;"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <div id="map" style="width: 100%; height: 600px;"></div>

<script>
  // Wisconsin bounding box [southWest, northEast]
  const wisconsinBounds = [
    [42.5, -92.9],  // SW corner
    [47.3, -86.7]   // NE corner
  ];

  // Initialize map without setView — we’ll fit bounds later
  const map = L.map('map', {
    maxBounds: wisconsinBounds,
    maxBoundsViscosity: 0.8,
    minZoom: 6,
    maxZoom: 10
  });

  // Add OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Locations from Django (already filtered & flattened)
  const locations = {{ locations|safe }};
  const markers = [];

  locations.forEach(loc => {
    const marker = L.marker([loc.latitude, loc.longitude])
      .bindPopup(`<b>${loc.name}</b><br>${loc.county}`);
    marker.addTo(map);
    markers.push({ marker: marker, county: loc.county });
  });

  // Load US counties GeoJSON
  fetch("{% static 'orgs/geo/gz_2010_us_050_00_500k.json' %}")
    .then(res => res.json())
    .then(data => {
      const wiCounties = {
        type: "FeatureCollection",
        features: data.features.filter(f => f.properties.STATE === "55")
      };
      console.log("Wisconsin counties loaded:", wiCounties.features.length);

      const geojsonLayer = L.geoJSON(wiCounties, {
        style: { color: '#3388ff', weight: 2, fillOpacity: 0.05 },
        onEachFeature: function(feature, layer) {
          layer.bindPopup(feature.properties.NAME);
          layer.on('click', function() {
            const countyName = feature.properties.NAME;
            markers.forEach(m => {
              if (m.county === countyName) {
                m.marker.addTo(map);
              } else {
                map.removeLayer(m.marker);
              }
            });
          });
        }
      }).addTo(map);

      // Fit map to Wisconsin counties bounds
      map.fitBounds(geojsonLayer.getBounds());

    })
    .catch(err => console.error("Error loading GeoJSON:", err));
</script>
</body>
</html>
