{% extends "orgs/layout.html" %}
{% load static %}
{% block body%}


  
  <div id="map" style="width: 100%; height: 600px;"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <div id="map" style="width: 100%; height: 600px;"></div>

<script>
// Initialize map
const map = L.map('map').setView([44.5, -89.5], 7); // Center on WI

// Use Humanitarian OSM tiles (free, reliable)
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors, Tiles style by Humanitarian OSM',
    subdomains: ['a','b','c'],
    maxZoom: 19
}).addTo(map);

// Locations from Django (already filtered & flattened)
const locations = {{ locations|safe }};
const markers = [];

// Add markers to map
locations.forEach(loc => {
    const marker = L.marker([loc.latitude, loc.longitude])
        .bindPopup(`<b>${loc.name}</b><br>${loc.county}
        <a href="/locations/?loc=${loc.id}">View Details</a>`);
    marker.addTo(map);
    markers.push({ marker: marker, county: loc.county });
});

// Load US counties GeoJSON
fetch("{% static 'orgs/geo/gz_2010_us_050_00_500k.json' %}")
.then(res => res.json())
.then(data => {
    // Filter only Wisconsin counties
    const wiCounties = {
        type: "FeatureCollection",
        features: data.features.filter(f => f.properties.STATE === "55")
    };
    console.log("Wisconsin counties loaded:", wiCounties.features.length);

    // Add GeoJSON layer
    const geojsonLayer = L.geoJSON(wiCounties, {
        style: { color: '#3388ff', weight: 2, fillOpacity: 0.05 },
        onEachFeature: function(feature, layer) {
            layer.bindPopup(feature.properties.NAME);

            layer.on('click', function() {
                const countyName = feature.properties.NAME;
                markers.forEach(m => {
                    if (m.county === countyName) {
                        m.marker.addTo(map);
                    } else {
                        map.removeLayer(m.marker);
                    }
                });
            });
        }
    }).addTo(map);

    // Fit map to Wisconsin counties bounds
    map.fitBounds(geojsonLayer.getBounds());

})
.catch(err => console.error("Error loading GeoJSON:", err));
</script>
</body>
{% endblock %}
