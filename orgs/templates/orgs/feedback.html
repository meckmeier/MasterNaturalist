{% extends "orgs/layout.html" %}

{% block body %}">
<div class="me-page">
    <h2>Send Feedback</h2>
    <p class="text-muted">
        Saw something odd? Have an idea? Leave a note here.
    </p>

    <form method="post" class="me-form">
        {% csrf_token %}

        <div class="mb-3">
            <label for="{{ form.name.id_for_label }}" class="form-label">Name (optional)</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label for="{{ form.email.id_for_label }}" class="form-label">Email (optional)</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label for="{{ form.note.id_for_label }}" class="form-label">Feedback</label>
            {{ form.note }}
        </div>

        {{ form.page_url }}

        <button type="submit" class="btn btn-primary">Submit Feedback</button>
    </form>
</div>
{% endblock %}
