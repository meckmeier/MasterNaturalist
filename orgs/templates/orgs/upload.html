{% extends "orgs/layout.html" %}
{% block body %}
{% load static %}

{% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}    
    </ul>
{% endif %} 
<h2>Upload Data</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div>
        <label for="file">Choose CSV or Excel file:</label><br>
        {{ form.file }}
    </div>

    <br>

    <button type="submit" class="me-btn">Upload</button>
</form>
<hr>
<a href="{% static 'upload_template.csv' %}"
   class="btn me-btn"
   download>
   Download Template
</a>
{% endblock %}
