{# location search modal #}
<div class="modal fade" id="locationSearchModal" tabindex="-1" aria-labelledby="locationSearchModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="locationSearchModalLabel">Find a location</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label for="location-search-input" class="form-label">Search locations</label>
          <input
            type="text"
            class="form-control"
            id="location-search-input"
            placeholder="Type a location name or city"
          >
        </div>

        <div class="mb-3">
          <h6>Your organization</h6>
          <div id="org-location-results" class="list-group"></div>
        </div>

        <div class="mb-3">
          <h6>Other locations</h6>
          <div id="other-location-results" class="list-group"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button"
                id="open-quick-add-location"
                class="btn btn-outline-primary"
                data-bs-toggle="modal"
                data-bs-target="#quickAddLocationModal"
                data-bs-dismiss="modal">
          Add new location
        </button>

        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
      </div>
    </div>
  </div>
</div>

{# location add modal #}
<div class="modal fade" id="quickAddLocationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="quick-location-form" method="post" action="/locations/loc_modal/">
        {% csrf_token %}
        <input type="hidden" name="org_id" value="{{ org.id }}">

        <div class="modal-header">
          <h5 class="modal-title">Add location</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Location name</label>
            <input type="text" name="loc_name" class="form-control" required>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="me-btn" data-bs-dismiss="modal">
            <span><i class="bi bi-x-square me-btn-icon"></i></span>
            <span class="me-btn-label">Cancel</span></button>
          <button type="submit" class="me-btn">
            <span><i class="bi bi-floppy me-btn-icon"></i></span>
            <span class="me-btn-label">Save</span></button>
        </div>
      </form>
    </div>
  </div>
</div>
